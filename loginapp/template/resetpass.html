
<!DOCTYPE html>
<html lang="en">

<head>
    {% load static %}
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Login | Patliputra Logostics</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- <link rel="stylesheet" href="{% static "/css/base.css" %}"> -->
  <link rel="stylesheet" href="{% static "/css/changepass.css" %}">
  <link rel="shortcut icon" href="{% static "images/krishco.png" %}" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  {% comment %} <script src="{% static 'js/login.js' %}"></script> {% endcomment %}
</head>

<body>
  <div class="front-div">
    <div class="leftdiv">
      <div class="for-table">
        <form action="" method="post" id="change-pass">
          {% csrf_token %}
          <table>
            <tr>
              <td><h1>Reset Password</h1></td>
            </tr>
            <tr>
              <td><span class="pass-heading">New Password</span> <input type="password" id="password" placeholder="New Password" name="newpass1" class="pass"><i class="fa-regular fa-eye-slash visible" ></i></td>
            </tr>
            <tr>
              <td> <span class="pass-heading">Confirm New Password</span><input type="password" id="confirmPassword" name="newpass2" placeholder="Confirm New Password" class="pass"><i class="fa-regular fa-eye-slash visible" ></i><span Id="passwordError"></span></td>
            </tr>
            <tr>
              <td class="for-button">
                <button  class="b2"  type="submit">Reset</button></td>
            </tr>
          </table>
        </form>
      </div>
    </div>
    <div class="rightdiv">
      <div class="for-img">
        <img class="imgs" src="{% static "/images/changepass1.png" %}" alt="" style="height: 100%; width: 100%; aspect-ratio: 16/9;">
      </div>
    </div>
  </div>
  
</body>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
$(document).ready(function () {
    $('.visible').click(function() {
      $(this).attr('class','fa-regular fa-eye-slash visible');
        var passField = $(this).siblings('.pass'); 
        var passType = passField.attr('type'); 
        if (passType === 'password') {
            passField.attr('type', 'text');
            $(this).attr('class','fa-regular fa-eye visible').css({'color':'blue'});
            
        } else {
            passField.attr('type', 'password');
            $(this).attr('class','fa-regular fa-eye-slash visible');
        }
        passField.focus();
    });
    $('#change-pass').submit(function(e) {
        var password = $('#password').val();
        var confirmPassword = $('#confirmPassword').val();

        if (password != confirmPassword) {
            $('#passwordError').text('Passwords do not match.');
            e.preventDefault(); 
        } else {
            $('#passwordError').text('');
        }
    });
});


   

 
    
   
  

</script>
{% if messages %}
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
  {% for msg in messages %}
          <script>
              Swal.fire({
                  icon: '{{msg.tags}}',
                  title: '{{msg}}',
                  showConfirmButton: true,
                  confirmButtonClass: 'btn btn-success'
              });
          </script>
  {% endfor %}
{% endif %}

</html>
