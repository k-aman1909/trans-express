{% extends aman.page_name %} {% block extralinks %} {% load static %}
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/>
<link rel="stylesheet" href="{% static 'css/p.css' %}" />
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %} {% block content %}

  <section class="table-content">
    
    <div class="for-btn"><h2>Vehicle Service From</h2>
      <a href="{% url 'vehicle_details' %}"> <button class="add-new"><i class="fa fa-plus"></i>&nbsp;Add New</button></a><br></div>
    <h3>
      <button
        onclick="$(this).siblings('div').css('display', $(this).siblings('div').css('display') === 'block' ? 'none' : 'block');$(this).children('.minimize-icon').children('i').attr('class', $(this).siblings('div').css('display') === 'block' ? 'fa fa-minus' : 'fa fa-plus');"
      >
        <span>Search Record</span
        ><span class="minimize-icon"><i class="fa fa-minus"></i></span>
      </button>
      <div class="table-content-div search-section">
        <form method="post" id="searching">
          {% csrf_token %}
          <table>
            <tr>
              <td>
                <label>Vehicle Type</label>
                <select name="vh_tpe" id="" style="text-align: center">
                  <option value="" selected>
                    ----Select Vehicle Type----
                  </option>
                  {% for a in data.vtype %}
                  <option value="{{ a.vtype }}">{{ a.vtype }}</option>
                  {% endfor %}
                </select>
                <span></span>
              </td>
              <td>
                <label>Load Type</label>
                <select name="lod_typ" id="">
                  <option value="" selected>
                    ------ Select Load Type -------
                  </option>
                  {% for a in data.ltype %}
                  <option value="{{ a.lt }}">{{ a.lt }}</option>
                  {% endfor %}
                </select>
                <span></span>
              </td>
              <td>
                <label>City Name</label>
                <select name="cty_name" id="">
                  <option value="" selected >

                    ------Select City ------
                  </option>
                  {% for a in data.city %}
                  <option value="{{ a.cname }}">{{ a.cname }}</option>
                  {% endfor %}
                </select>
                <span></span>
              </td>
            </tr>
            <tr>
              <td colspan="3" align="center">
                <input type="button"  id="data" class="entry-button" value="🔎 Search" />
                <input
                  type="reset"
                  class="entry-button"
                  style="background-color: #ea5453; margin-left: 3rem"
                  value="↻ Refresh"
                />
              </td>
            </tr>
            <tr hidden >
              <td><input type="text" id="deponame" name="deponame"></td>
          </tr>
          </table>
        </form>
      </div>
    </h3>
  </section>
  <section>
    <div class="search-table">
          
    </div>
  </section>
  <script>
    $(document).ready(function () {
      let value = sessionStorage.getItem('depot_Name')
      $('#deponame').val(value);
        $('#data').click(function(e){
           $.ajax({
            url: "{% url "vehicle_service" %}",
            type: "POST",
            data: $('#searching').serialize(),
            success: function (response) {
              
                if (response.success == true){
                    $('.search-table').html(response.value);
                }
                else{
                    Swal.fire({
                        icon: 'warning',
                        title: response.messages,
                        showConfirmButton: true,
                        confirmButtonClass: 'btn btn-success'
                    });
                }
            }
           });
        });
    });
</script>
  {% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
{% for msg in messages %} {% if msg.tags == 'success' %}
<script>
  Swal.fire({
    icon: "success",
    title: "{{msg}}",
    showConfirmButton: true,
    confirmButtonClass: "btn btn-success",
  });
</script>
{% endif %} 
{% endfor %} 
{% endif %} 
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script>
        function del(d) {
            swal.fire({
                title: 'Are you sure?',
                text: 'Do you want to delete this record?',
                icon: 'question',
                confirmButtonColor: '#DD6B55',
                confirmButtonText: 'Yes, delete me',
                showCancelButton: true,
                cancelButtonText: "No, don't delete me"
            }).then((res) => {
                if (res.isConfirmed) {
                    window.location.href = d

                }
            });
        }
</script>

  


{% endblock content %}
