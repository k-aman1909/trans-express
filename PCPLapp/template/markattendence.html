{% extends data.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.15.3/dist/sweetalert2.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.15.3/dist/sweetalert2.all.min.js"></script>
{% endblock extralinks %}
{% block content %}
<div class="container">
    <div class="for-btn"><h2>Distributor Details Form</h2>
        <a href="{% url 'attendence' %}"> <button class="add-new" style="background-color: blue; color: white; border-radius: .2rem; position: absoluter;right: 10rem;">View Attendance</button></a><br></div>
    <div class="alert text-center fs-3" style="background-color: navy; color: white; border-radius: 10px;">Mark Attendance</div>
    <div class="card-body">
        <form id="submitform" method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-lg-4 p-2 mb-2">
                    <div class="form-group">
                        <label for="distributor_id">Distributor ID:</label>
                        <select class="form-control" id="distributor_id" name="distributor_id" required>
                            <option value="">Select Distributor ID</option>
                            {% for distributor in data.dist_id %}
                            <option value="{{ distributor.dist_id }}">{{ distributor.dist_id }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="col-lg-4 p-2 mb-2">
                    <div class="form-group">
                        <label for="distributor_name">Name:</label>
                        <input type="text" placeholder="Name" required class="form-control" id="distributor_name" name="distributor_name" readonly>
                    </div>
                </div>
                
                <div class="col-lg-4 p-2 mb-2">
                    <div class="form-group">
                        <label for="distributor_post">Post:</label>
                        <input type="text" class="form-control" required placeholder="Post" id="distributor_post" name="distributor_post" readonly>
                    </div>
                </div>

                <div class="col-lg-4 p-2 mb-2">
                    <div class="form-group">
                        <label for="distributor_contact">Contact No. :</label>
                        <input type="text" class="form-control" required placeholder="Contact No." id="distributor_contact" name="distributor_contact" readonly>
                    </div>
                </div>

                <div class="col-lg-4 p-2 mb-2">
                    <div class="form-group">
                        <label for="attendance_time">Attendance Time:</label>
                        <input type="text" class="form-control" required id="attendance_time" name="attendance_time" readonly>
                    </div>
                </div>
                
                <div class="col-lg-4 p-2 mb-2">
                    <div class="form-group">
                        <label for="attendance_status">Attendance Status:</label>
                        <select class="form-control" id="attendance_status" name="attendance_status" required>
                            <option value="" disabled>Select Status</option>
                            <option value="Present" selected>Present</option>
                            <option value="Absent" disabled>Absent</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="col-lg-4">
                        <video id="preview" style="width: 300px; height: 300px; border: 1px solid black;"></video>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-12">
                    <div class="d-flex w-100 justify-content-around">
                        <button type="button" class="btn btn-primary" id="scan_qr_code"> <i class="fa-solid fa-camera"></i> Scan QR Code</button>
                        <button type="submit" class="btn btn-primary"> <i class="fa-solid fa-check"></i> Submit</button>
                        <button type="button" onclick="window.location.reload()" class="btn btn-secondary"> <i class="fa-solid fa-rotate"></i> Reset</button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
<script src="https://rawgit.com/schmich/instascan-builds/master/instascan.min.js"></script>
<script>
    function distDetails(iid){
        $.ajax({
            type: "GET",
            url: "{% url 'markAttendence' %}",
            data: {
                'iid' : iid
            },
            success: function(data) {
                $("#distributor_name").val(data.name);
                $("#distributor_post").val(data.post);
                $("#distributor_contact").val(data.contact);
            }
        });
    }
    // complete-validation.js
$(document).ready(function() {
    // Get current time
    var currentTime = new Date();
    var hours = currentTime.getHours();
    var minutes = currentTime.getMinutes();
    var seconds = currentTime.getSeconds();
    var time = hours + ":" + minutes + ":" + seconds;
    $("#attendance_time").val(time);

    // Get distributor details
    $("#distributor_id").change(function() {
        distDetails($(this).val())
    });

    // Scan QR code
    $(document).ready(function () {
        $("#scan_qr_code").click(function () {
            let scanner = new Instascan.Scanner({
                video: document.getElementById('preview'),
                mirror: false  // Ensure correct orientation
            });

            scanner.addListener('scan', function (content) {
                let qrCodeContent = content;  // Get scanned QR data
                // console.log(content);
                $('#distributor_id').val(content.trim());
                distDetails(content.trim())
                scanner.stop();
            });
            // Start scanning
            Instascan.Camera.getCameras().then(function (cameras) {
                if (cameras.length > 0) {
                    scanner.start(cameras[0]); // Use the first camera
                } else {
                    alert("No cameras found.");
                }
            }).catch(function (err) {
                alert("Camera access error: " + err);
            });
        });
    });

});
</script>
<script>
    function getCsrfToken() {
    const csrfInput = document.querySelector('input[name="csrfvalue"]');
    return csrfInput ? csrfInput.value : null;
}
function sendRecord(event){
    swal.fire({
        title: 'Are you sure?',
        text: 'Do You Want To Mark The Attendence ?',
        icon: 'question',
        confirmButtonColor: 'rgb(66 215 9)',
        confirmButtonText: '✔ Mark Present',
        showCancelButton: true,
        cancelButtonText: "✖ Cancel",
        cancelButtonColor: "rgb(215 9 9)",
    }).then((res) => {
        if (res.isConfirmed) {
            const form = event.target;
            const formData = new FormData(form);
            fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-CSRFToken': getCsrfToken()
                }
            }).then((response) => {
                return response.json();
            }).then((responseData) => {
                if (responseData.status) {
                    Swal.fire({
                        icon: 'Success',
                        title: responseData.title,
                        html: responseData.message,
                        showConfirmButton: true,
                    }).then((res) => {
                        if (res.isConfirmed || res.dismiss == 'backdrop') {
                            window.location.reload()
                        }
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: responseData.title,
                        html: responseData.message,
                        showConfirmButton: true,
                    });
                }
            }).catch(error => {
                console.error('Error fetching data:', error);
            });
        }
    });
}


document.getElementById('submitform').addEventListener('submit', function (event) {
    event.preventDefault();
    sendRecord(event);
});
</script>
{% endblock  %}
