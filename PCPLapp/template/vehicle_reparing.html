{% extends aman.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/p.css' %}">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %}
{% block content %}
<section class="main-content">

    <section class="table-content">
        <h2>Vehicle Reparing Entry Form</h2>
         <div class="table-content-div">
                    <form method="POST">
                        {% csrf_token %}
                        <table>
                            <tr>
                                <td>
                                    <label>Vehicle No <font style="color:red;">*</font></label>
                                    <select name="veh_no" id="">
                                        <option value="" selected disabled>-- select vehicle no. --</option>
                                        {% for a in aman.depotname %}
                                        <option value="{{a.veh_no}}">{{a.veh_no}}</option>
                                        {% endfor %}
                                    </select>
                                </td>
                                <td>
                                    <label for="" style="display:block;">Repairing Date</label>
                                    <input type="date" name="rep_date" id="vrrd" class="date" required>
                                    <span></span>
                                </td>
                                <td>
                                    <label for="">Parts Name <font style="color:red;">*</font></label>
                                    <input type="text" name="part" id="partsname" placeholder="Parts Name" required
                                        onclick="something('#partsname')">
                                    <span style="font-size:1rem;"></span>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label for="">Price <font style="color:red;">*</font></label>
                                    <input type="text" name="price" id="prc" placeholder="Price" required
                                    onfocus="cost('#prc')">
                                    <span></span>
                                </td>
                                <td colspan="2" align="center">
                                    <input type="submit" class="entry-button" value="&#10003; Submit">
                                    <input type="reset" class="entry-button"
                                        style="background-color:#EA5453;margin-left:3rem;" onclick="window.location.reload()"  value="↻ Refresh">
                                </td>
                            </tr>
                            <tr hidden >
                                <td><input type="text" id="deponame" name="deponame"></td>
                            </tr>
                            <tr hidden>
                                <td><input type="text" id="depotname" name="depo_id"></td>
                            </tr>
                        </table>
                    </form>
                </div>
            </section>
        </div>
</section>
<script>
    $(document).ready(function () {
        let value = sessionStorage.getItem('depot_Name')
        $('#depotname').val(value);
    });
    $(document).ready(function () {
        let value = sessionStorage.getItem('depot_Name')
        $('#deponame').val(value);
    });
</script>
{% if messages %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
{% for msg in messages %}
{% if msg.tags == 'success' %}
<script>
    Swal.fire({
        icon: '{{msg.tags}}',
        title: 'Record successfully added',
        showConfirmButton: true,
        confirmButtonClass: 'btn btn-success'
    });
</script>
{% endif %}
{% endfor %}
{% endif %}

{% endblock content %}
