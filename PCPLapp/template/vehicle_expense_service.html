{% extends aman.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/p.css' %}">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
{% comment %} <script src="{% static 'js/validation.js' %}"></script> {% endcomment %}
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %}
{% block content %}
<section class="main-content">

    <section class="table-content">
        <h2>Vehicle Expense Update</h2>
                <div class="table-content-div">
                    <form method="POST" >
                        {% csrf_token %}
                        <table>
                            <tr>
                                <td>
                                    <label>Vehicle No <font style="color:red;">*</font></label>
                                    <input type="text" name="veh_no" readonly value="{{a.veh_no}}" required id="veh_no" placeholder="Vehicle No" onfocus="vehicle('#veh_no')">
                                    <span></span>
                                </td>
                                <td>
                                    <label for="">Fuel Qty(In LTR) <font style="color:red;">*</font></label>
                                    <input type="text" name="fuel_qty" value="{{a.fuel_qty}}" id="fuel_qty" required placeholder="Fuel Qty(In LTR)" onfocus="num('#fuel_qty')" >
                                    <span></span>
                                </td>
                                <td>
                                    <label for="">Fuel Amount <font style="color:red;">*</font></label>
                                    <input type="text" name="fuel_amt" value="{{a.fuel_amt}}" id="fuel_amt" placeholder="Fuel Amount"required
                                        onfocus="num('#fuel_amt')">
                                    <span></span>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label for="">Toll Amount<font style="color:red;">*</font></label>
                                    <input type="text" name="toll_amt" value="{{a.toll_amt}}" id="toll_amt" placeholder="Toll Amount "required
                                        onfocus="num('#toll_amt')">
                                    <span></span>
                                </td>
                                <td>
                                    <label for="">Misc. Amount <font style="color:red;">*</font></label>
                                    <input type="text" name="misc_amt" value="{{a.misc_amt}}" id="misc_amt" placeholder="Misc. Amount" required
                                        onfocus="num('#misc_amt')">
                                    <span></span>
                                </td>
                                <td>
                                    <label for="">Total Amount <font style="color:red;">*</font></label>
                                    <input type="text" name="total_amt" id="total" value="{{a.total_amt}}" placeholder="Total Amount" required
                                        onfocus="num('#total')">
                                    <span></span>
                                </td>
                            </tr>
                            <tr>
                                <td colspan="3" align="center">
                                    <input type="submit" class="entry-button" value="&#10003; Update">
                                    <input type="reset" class="entry-button"
                                        style="background-color:#EA5453;margin-left:3rem;" value="↻ Refresh">
                                </td>
                            </tr>
                        </table>
                    </form>
                </div>
            </section>
        </div>
</section>
<script>
    $(document).ready(function () {
        $('#fuel_amt,#toll_amt,#misc_amt').keyup(function (e) { 
            let value = parseInt($('#fuel_amt').val()) + parseInt($('#toll_amt').val()) + parseInt($('#misc_amt').val())
            $('#total').val(value);
        });
    });
</script>
{% endblock content %}
