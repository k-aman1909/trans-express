{% extends aman.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/p.css' %}">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %}
{% block content %}
<section class="main-content">
    <section class="table-content">

        <div class="for-btn">
            <h2>Depot Service Form</h2>
            <a href="{% url 'Depot' %}"> <button class="add-new"><i class="fa fa-plus"></i>&nbsp;Add
                    New</button></a><br>
        </div>
        <br>

        <h3>
            <button
                onclick="$(this).siblings('div').css('display', $(this).siblings('div').css('display') === 'block' ? 'none' : 'block');$(this).children('.minimize-icon').children('i').attr('class', $(this).siblings('div').css('display') === 'block' ? 'fa fa-minus' : 'fa fa-plus');"><span>Search
                    Record</span><span class="minimize-icon"><i class="fa fa-minus"></i></span></button>
            <div class="table-content-div search-section">
                <form method="post" id="search">
                    {% csrf_token %}
                    <table>
                        <tr>
                            <td>
                                <label  >Principal Comapany Name</label>
                                <select name="s1" id="" >

                                    <option value="" selected disabled>---- Principal Comapany Name ----</option>
                                    {% for a in data.name %}
                                    <option value="{{a.pri_name}}">{{a.pri_name}}</option>
                                    {% endfor %}
                                </select>
                                <span></span>
                            </td>
                            <td>
                                <label>District </label>
                                <select name="s2" id="" style="width: 100%;">
                                    <option value="" selected disabled>---- Select District ----</option>
                                    {% for x in data.distr %}

                                    <option value="{{x.distr}}">{{x.distr}}</option>
                                    {% endfor %}
                                </select>
                                <span></span>
                            </td>
                            <td align="center">
                                <input type="button" id="submit" class="entry-button" value="🔎 Search">
                                <input type="reset" class="entry-button"
                                    style="background-color:#EA5453;margin-left:3rem;" value="↻ Refresh"
                                    onclick="window.location.reload()">
                            </td>
                        

                        </tr>
                    </table>
                </form>
            </div>
        </h3>
    </section>
    <div class="dwnld-div" style="position: relative;height: 3rem; background: none;"><button class="entry-button" type="button" style="display:none;position: absolute;right: 0;" id="dwnld"><i class="fa-solid fa-download" style="color:blue;cursor:pointer;"></i> Download all recods</button></div>
    <div class="search-table">

    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script src="https://cdn.rawgit.com/rainabba/jquery-table2excel/1.1.0/dist/jquery.table2excel.min.js" type="text/javascript"></script>
    <script>
        function del(d) {
            swal.fire({
                title: 'Are you sure?',
                text: 'Do you want to delete this record?',
                icon: 'question',
                confirmButtonColor: '#DD6B55',
                confirmButtonText: 'Yes, delete me',
                showCancelButton: true,
                cancelButtonText: "No, don't delete me"
            }).then((res) => {
                if (res.isConfirmed) {
                    window.location.href = d

                }
            });

        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    {% if messages %}
    {% for msg in messages %}
    {% if msg.tags == 'success' %}
    <script>
        Swal.fire({
            icon: '{{msg.tags}}',
            title: '{{msg}}',
            showConfirmButton: true,
            confirmButtonClass: 'btn btn-success'
        });
    </script>
    {% endif %}
    {% endfor %}
    {% endif %}

    <script>
        $(document).ready(function () {
            $('#submit').click(function (e) {
                $.ajax({
                    url: "{% url "Depot_Service" %}",
                    type: "POST",
                    data: $('#search').serialize(),
                    success: function (response) {
                        if (response.success == true) {
                            $('.search-table').html(response.value);
                            $('#dwnld').css({'display':'block'});
                        }
                        else {
                            $('#dwnld').css({'display':'none'});
                            Swal.fire({
                                icon: 'warning',
                                title: response.message,
                                showConfirmButton: true,
                                confirmButtonClass: 'btn btn-success'
                            });
                        }
                    }
                });
            });
            $('#dwnld').click(function (e) {
                $(".search-table table").table2excel({
                    exclude: ".leave",
                    filename: "depot_details.xls"
                });
            });
        });

    </script>

</section>
{% endblock content %}
