{% extends aman.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/p.css' %}">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %}
{% block content %}
<section class="main-content">
   
    <section class="table-content">
        <h2>Expense Report</h2>        
        <h3>
            <button onclick="$(this).siblings('div').css('display', $(this).siblings('div').css('display') === 'block' ? 'none' : 'block');$(this).children('.minimize-icon').children('i').attr('class', $(this).siblings('div').css('display') === 'block' ? 'fa fa-minus' : 'fa fa-plus');"><span>Search Record</span><span class="minimize-icon"><i class="fa fa-minus"></i></span></button>
            <div class="table-content-div search-section">
                <form method="POST" id="searching">
                    {% csrf_token %}
                    <table>
                        <tr>
                            <td>
                                <label for="" style="display:block;">Vehicle No</label>
                                <select name="veh_no" id="option">
                                    <option value="" selected >------ Select Vehicle No ------</option>
                                    {% for a in aman.depotname %}
                                        <option value="{{a.veh_no}}">{{a.veh_no}}</option>
                                    {% endfor %}
                                </select>
                                <span></span>
                            </td>
                            <td>
                                <label style="display:block;">From Date</label>
                                <input type="date" name="f_date" id="epfd">
                                <span></span>
                            </td>
                            <td>
                                <label style="display:block;">To Date</label>
                                <input type="date" name="t_date" id="eptd">
                                <span></span>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="3" align="center">
                                <input type="button" id="data" class="entry-button" value="🔎 Search">
                                <input type="reset" class="entry-button" onclick="window.location.reload()" style="background-color:#EA5453;margin-left:3rem;" value="↻ Refresh">
                            </td>
                        </tr>
                        <tr hidden >
                            <td><input type="text" id="deponame" name="deponame"></td>
                        </tr>
                    </table>
                </form>
            </div>
        </h3>
    </section>
     <div class="search-table value-value">
                   
    </div>
    <div class="search-table data-value">
        
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    <script>
        function del(d){
            swal.fire({
                title: 'Are you sure?',
                text: 'Do you want to delete this record?',
                icon: 'question',
                confirmButtonColor: '#DD6B55',
                confirmButtonText:'Yes, delete me',
                showCancelButton: true,
                cancelButtonText:"No, don't delete me"
              }).then((res) => {
                  if(res.isConfirmed)
                  {
                    window.location.href=d
                    
                  }
                  
                  else{
                    Swal.fire({
                        position: "top-end",
                        icon: "info",
                        title: "Thanks for visit",
                        showConfirmButton: false,
                        timer: 1500
                    });
    
                  }
              });
            }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
    {% if messages %}
    {% for msg in messages %}
        {% if msg.tags == 'success' %}
            <script>
                Swal.fire({
                    icon: '{{msg.tags}}',
                    title: 'Record updated successfully ',
                    showConfirmButton: true,
                    confirmButtonClass: 'btn btn-success'
                });
            </script>
        {% endif %}
    {% endfor %}
{% endif %}
<script>
    $(document).ready(function () {
        let value = sessionStorage.getItem('depot_Name')
        $('#deponame').val(value);
        $('#data').click(function(e){
           $.ajax({
            url: "{% url "expense_report" %}",
            type: "POST",
            data: $('#searching').serialize(),
            success: function (response) {
              
                if (response.success == true){
                    $('.value-value').html(response.value);
                    $('.data-value').html(response.data);
                }
                else{
                    Swal.fire({
                        icon: 'warning',
                        title: response.messages,
                        showConfirmButton: true,
                        confirmButtonClass: 'btn btn-success'
                    });
                }
            }
           });
        });
    });
  </script>
</section>

{% endblock content %}
