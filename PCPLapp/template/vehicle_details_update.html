{% extends aman.page_name %} {% block extralinks %} {% load static %}
<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
  crossorigin="anonymous"
  referrerpolicy="no-referrer"
/>
<link rel="stylesheet" href="{% static 'css/p.css' %}" />
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %} {% block content %}

<section class="table-content">
  <div class="for-btn">
    <h2>Vehicle Details Updation Form</h2>
    <a href="{% url 'vehicle_service' %}">
      <button class="add-new">
        <i class="fa-solid fa-xmark"></i>&nbsp;Close
      </button></a
    ><br />
  </div>

  <div class="table-content-div">
    <form method="post">
      {% csrf_token %}
      <table>
        <tr>
          <td align="left">
            <label>Load Type <font style="color: red">*</font></label>
            <input type="radio" name="load_type" value="FTL" id="" {% if a.lt == 'FTL' %} checked {% endif %} /> FTL
            <input type="radio" name="load_type" value="PTL" id="" {% if a.lt == 'PTL' %} checked {% endif %} /> PTL 
            <input type="radio" name="load_type" value="Weight" id="" {% if a.lt == 'Weight' %} checked {% endif %} /> Weight

            <span></span>
          </td>
          <td>
            <label for="">Freight <font style="color: red">*</font></label>
            <input
              type="text"
              id="f-ght"
              placeholder="Freight"
              value="{{a.vprise}}"
              name="freight"
              required
              onfocus="fgt('#f-ght')"
              
            />
            <span></span>
          </td>
          <td>
            <label for=""></label>
            <select name="city" id="cityname" style="text-align: center" required>
              <option value="">------- Select City Name -------</option>
                      {% for city in city_name %}
                        <option value="{{city}}" {% if a.cname == city %} selected {% endif %} >{{city}}</option>
                      {% endfor %}
            </select>
            <span></span>
          </td>
        </tr>
        <tr>
          <td>
            <label for="">Vehicle Type <font style="color: red">*</font></label>

            <input type="text" id="vtype" name="vtype" value="{{a.vtype}}" placeholder="Vehicle Type" required 
            onfocus="vehicletype('#vtype')"/>
            <span></span>
          </td>
          <td colspan="2" align="center">
            <input type="submit" class="entry-button" value="&#10003; Update" />
            <input type="reset" class="entry-button" style="background-color: #ea5453; margin-left: 3rem"  value="↻ Refresh"/>
          </td>
        </tr>
      </table>
    </form>
  </div>
</section>
<script>
</script>

{% endblock content %}
