{% extends aman.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/p.css' %}">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/validation.js' %}"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %}
{% block content %}
<section class="main-content">
    <section class="table-content">
        <h2>Vehicle Expense Entry Form</h2>
        <div class="table-content-div">
            <form method="POST" id="searching">
                {% csrf_token %}
                <table>
                    <tr>
                        <td>
                            <label>Vehicle No <font style="color:red;">*</font></label>
                            <input type="text" name="veh_no" required id="veh_no" placeholder="Vehicle No"
                                onfocus="vehicle('#veh_no')" style="text-transform: uppercase;">
                            <span></span>
                        </td>
                        <td>
                            <label for="">Select Oil</label>
                            <select name="fuel_no" id="optiontwo" required style="border:  solid black;">
                                <option value="">------ Select Oil ------</option>
                                <option value="Gasoline (Petrol)">Gasoline (Petrol)</option>
                                <option value="Diesel">Diesel</option>
                                <option value="Electricity (for Electric Vehicles)">Electricity (for Electric Vehicles)
                                </option>
                                <option value="CNG">CNG</option>
                                <option value="Hydrogen">Hydrogen</option>

                            </select>
                            <span></span>
                        </td>
                        <td>
                            <label for="">Fuel Qty <font style="color:red;">*</font></label>
                            <input type="text" name="fuel_qty" id="fuel_qty" required placeholder="Fuel Qty"
                                onfocus="num('#fuel_qty')" style="width:45%">
                            <select name="f_qty" id="optiontwo" required style=" width: 50%;">
                                <option value="qty" selected disabled>Qty</option>
                                <option value="Liters (L) ">Liters (L) </option>
                                <option value="Kilowatt-hours (kWh)">Kilowatt-hours (kWh)</option>
                                <option value=" kilograms (kg)"> kilograms (kg)</option>

                            </select>
                            <span></span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="" style="display:block;">Expense Date</label>
                            <input type="date" name="exp_date" id="eved" class="date" required>
                            <span></span>
                        </td>
                        <td>
                            <label for="">Fuel Amount <font style="color:red;">*</font></label>
                            <input type="text" name="fuel_amt" id="fuel_amt" class="amnt" value="0"
                                placeholder="Fuel Amount" required onfocus="price('#fuel_amt')">
                            <span></span>
                        </td>
                        <td>
                            <label for="">Toll Amount<font style="color:red;">*</font></label>
                            <input type="text" name="toll_amt" value="0" class="amnt" id="toll_amt"
                                placeholder="Toll Amount " required onfocus="price('#toll_amt')">
                            <span></span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <label for="">Misc. Amount <font style="color:red;">*</font></label>
                            <input type="text" name="misc_amt" value="0" class="amnt" id="misc_amt"
                                placeholder="Misc. Amount" required onfocus="price('#misc_amt')">
                            <span></span>
                        </td>
                        <td>
                            <label for="">Total Amount <font style="color:red;">*</font></label>
                            <input type="text" name="total_amt" id="total" value="0" placeholder="Total Amount" required
                                onfocus="price('#total')" readonly>
                            <span></span>
                        </td>
                        <td colspan="3" align="center">
                            <input type="submit" id="data" class="entry-button" value="&#10003; Submit">
                            <input type="reset" class="entry-button" onclick="window.location.reload()"
                                style="background-color:#EA5453;margin-left:3rem;" value="↻ Refresh">
                        </td>
                    </tr>
                    <tr hidden>
                        <td><input type="text" id="depotname" name="depo_id"></td>
                    </tr>
                </table>
            </form>
        </div>
    </section>
    </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
{% if messages %}
{% for msg in messages %}
{% if msg.tags == 'success' %}
<script>
    Swal.fire({
        icon: '{{msg.tags}}',
        title: 'Record successfully added',
        showConfirmButton: true,
        confirmButtonClass: 'btn btn-success'
    });
</script>
{% endif %}
{% endfor %}
{% endif %}
<script>
    $(document).ready(function () {
        let value = sessionStorage.getItem('depot_Name')
        $('#depotname').val(value);
    });
    $(document).ready(function () {
        $('#fuel_amt, #toll_amt, #misc_amt').keyup(function (e) {
            let fuelValue = parseFloat($('#fuel_amt').val()) || 0;
            let tollValue = parseFloat($('#toll_amt').val()) || 0;
            let miscValue = parseFloat($('#misc_amt').val()) || 0;
            let total = fuelValue + tollValue + miscValue;
            $('#total').val(isNaN(total) ? 0 : total);
        });

        $('.amnt').on('keypress', function () {
            var currentValue = $(this).val();
            if (currentValue === '0') {
                $(this).val('');
            }
        });

    });
</script>
{% endblock content %}
