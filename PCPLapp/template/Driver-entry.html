{% extends aman.page_name %}
{% block extralinks %}
{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="{% static 'css/p.css' %}">
<link rel="stylesheet" href="{% static 'css/img.css' %}">
<link rel="stylesheet" href="p.css">
<link rel="stylesheet" href="{% static 'css/profilemain.css' %}">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'js/complete-validation.js' %}"></script>
{% endblock extralinks %}
{% block content %}
    <section class="table-content">
        <div class="for-btn"><h2>Driver Details Form</h2>
            <a href="{% url 'driver_details' %}"> <button class="add-new"><i
                class="fa-solid fa-xmark"></i>&nbsp;Close</button></a><br></div>
        <div class="table-content-div">
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                <table>
                   <tr>
                    <td rowspan="3" class="e_img">
                        <div class="for-img " title="Upload image">

                            <label class="l_upload" for="pic" title="Upload image" style="z-index: 1;"><img
                                    src="{% static 'Image/upload.jpg' %}" class="auto-img" alt="uploding Image" >Upload
                                Driver Photo</label>
                            <input type="file" id="pic" src=""  name="profile_pic" style="height:100%;z-index: 9999;opacity: 0;" onchange="previewImage(event)">
                            <div class="img-box" style="top:0;">
                                <img src="{% static 'image/upload.jpg' %}" style="width: 100%; " alt="uploding Image">
                            </div>
                        </div>
                    </td>
                        <td>
                            <label style="display:block;">Driver Id<font style="color:red;">*</font></label>
                            <input type="text" name="drv_id" id="" placeholder="Driver Id" readonly value={{drv_id}}>
                            <span></span>
                        </td>
                        <td>
                            <label>Driver Name<font style="color:red;">*</font></label>
                            <input type="text" name="drv-name" id="name" placeholder="Driver Name" onfocus="alphabets('#name')"  required >
                            <span></span>
                        </td>
                        
                        

                    </tr>
                    <tr>
                        <td>
                            <label>Contact No.<font style="color:red;">*</font></label>
                            <input type="text" name="drv-contact" maxlength="10" id="contact" placeholder="Contact No." onfocus="number('#contact')"  required >
                            <span></span>
                        </td> 
                        
                        <td>
                            <label>Driving License No.<font style="color:red;">*</font></label>
                            <input type="text"  name="drv-lisen-no" id="dlno" onfocus="DL('#dlno')" minlength="15" placeholder="Driving License No." required>
                            <span></span>
                        </td>
                        
                    </tr>
                   
                    <tr>
                        <td>
                            <label>Salary</label>
                            <input type="text" name="drv_sal" id="sal"onfocus="price('#sal')" placeholder="Salary"  required>
                            <span></span>
                        </td>
                        <td>
                            <label for="addhar">Aadhar</label>
                            <input type="text" name="drv_addhar" maxlength="12" id="aadhar"onfocus="num('#aadhar')" placeholder="Aadhar number" required>
                            <span></span>
                        </td>
                        
                    </tr>
                    <tr>
                        <td colspan="3" align="center">
                            <input type="submit" class="entry-button" value="&#10003; Submit">
                            <input type="reset" class="entry-button" style="background-color:#EA5453;margin-left:3rem;" value="↻ Refresh">
                        </td>
                    </tr>
                    <tr hidden>
                        <td><input type="text" id="depotname" name="depo_id"></td>
                    </tr>
                </table>
            </form>
        </div>
    </section>
</section>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script>
{% if messages %}
    {% for msg in messages %}
        {% if msg.tags == 'success' %}
            <script>
                Swal.fire({
                    icon: '{{msg.tags}}',
                    title: '{{msg}}',
                    showConfirmButton: true,
                    confirmButtonClass: 'btn btn-success'
                });
            </script>
        {% endif %}
    {% endfor %}
{% endif %}

<script>
    $(document).ready(function () {
        let value = sessionStorage.getItem('depot_Name')
        $('#depotname').val(value);
    });
</script>
{% endblock content %}
